name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            panel/agent/target/
            panel/backend/target/
            panel/cli/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross-compilation tools (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure cross-compilation (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build agent
        run: cargo build --release --target ${{ matrix.target }} --manifest-path panel/agent/Cargo.toml

      - name: Build API
        run: cargo build --release --target ${{ matrix.target }} --manifest-path panel/backend/Cargo.toml

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --manifest-path panel/cli/Cargo.toml

      - name: Package binaries
        run: |
          mkdir -p release
          cp panel/agent/target/${{ matrix.target }}/release/arc-agent release/arc-agent-linux-${{ matrix.arch }}
          cp panel/backend/target/${{ matrix.target }}/release/arc-api release/arc-api-linux-${{ matrix.arch }}
          cp panel/cli/target/${{ matrix.target }}/release/arc release/arc-linux-${{ matrix.arch }}
          chmod +x release/*

          # Report binary sizes
          echo "Binary sizes (${{ matrix.arch }}):"
          ls -lh release/

      - name: Install cargo-sbom
        if: matrix.arch == 'amd64'
        run: cargo install cargo-sbom --locked --version ^0.10 --force

      - name: Generate SBOMs (SPDX JSON)
        if: matrix.arch == 'amd64'
        run: |
          cargo sbom --project-directory panel/agent   --output-format spdx_json_2_3 > release/arc-agent.spdx.json
          cargo sbom --project-directory panel/backend --output-format spdx_json_2_3 > release/arc-api.spdx.json
          cargo sbom --project-directory panel/cli     --output-format spdx_json_2_3 > release/arc-cli.spdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.arch }}
          path: release/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd panel/frontend
          npm ci
          npx vite build

      - name: Package frontend
        run: |
          cd panel/frontend
          tar czf ../../arcpanel-frontend.tar.gz dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend
          path: arcpanel-frontend.tar.gz

  release:
    needs: [build, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/binaries-amd64/* release/
          cp artifacts/binaries-arm64/* release/
          cp artifacts/frontend/arcpanel-frontend.tar.gz release/

          # Create checksums (over binaries + SBOMs, before signatures)
          cd release
          sha256sum arc-* > checksums.txt

          echo "Release contents:"
          ls -lh

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v2.4.1'

      - name: Sign release assets (keyless via Sigstore)
        run: |
          cd release
          for f in $(ls | grep -v '\.sig$' | grep -v '\.pem$'); do
            echo "Signing $f"
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          echo "Signed assets:"
          ls -lh *.sig *.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/*
