{% if rate_limit > 0 %}
limit_req_zone $binary_remote_addr zone=rl_{{ domain | replace(from=".", to="_") }}:10m rate={{ rate_limit }}r/s;
{% endif %}
{% if fastcgi_cache %}
fastcgi_cache_path /var/cache/nginx/fastcgi/{{ domain | replace(from=".", to="_") }} levels=1:2 keys_zone=fc_{{ domain | replace(from=".", to="_") }}:10m max_size=256m inactive=60m use_temp_path=off;
{% endif %}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

{% if bot_protection == "block" %}
map $http_user_agent $bad_bot {
    default 0;
    ~*(?:ahrefsbot|semrushbot|dotbot|mj12bot|blexbot|petalbot|bytespider|gptbot|claudebot) 1;
    ~*(?:scrapy|wget|curl/|python-requests|go-http-client|java/) 1;
    "" 1;
}
{% endif %}
{% if bot_protection == "rate-limit" %}
limit_req_zone $binary_remote_addr zone=bot_{{ domain | replace(from=".", to="_") }}:10m rate=5r/s;
{% endif %}

# HTTP → HTTPS redirect
server {
{% if bind_ip %}
    listen {{ bind_ip }}:80;
{% else %}
    listen 80;
{% endif %}
    listen [::]:80;
    server_name {{ domain }};

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
{% if bind_ip %}
    listen {{ bind_ip }}:443 ssl;
{% else %}
    listen 443 ssl;
{% endif %}
    listen [::]:443 ssl;
    server_name {{ domain }};

    ssl_certificate {{ ssl_cert }};
    ssl_certificate_key {{ ssl_key }};
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size {{ max_upload_mb }}m;

{% if rate_limit > 0 %}
    limit_req zone=rl_{{ domain | replace(from=".", to="_") }} burst={{ rate_limit * 2 }} nodelay;
    limit_req_status 429;
{% endif %}

{% if waf_enabled %}
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity/sites/{{ domain | replace(from=".", to="_") }}.conf;
{% endif %}

{% if bot_protection == "block" %}
    if ($bad_bot) { return 403; }
{% endif %}
{% if bot_protection == "rate-limit" %}
    limit_req zone=bot_{{ domain | replace(from=".", to="_") }} burst=20 nodelay;
    limit_req_status 429;
{% endif %}
{% if bot_protection == "challenge" %}
    set $bot_challenge 0;
    if ($http_cookie !~* "dp_verified=1") { set $bot_challenge 1; }
    if ($request_uri = /.well-known/bot-verify) { set $bot_challenge 0; }
    if ($http_user_agent ~* "googlebot|bingbot|yandexbot|duckduckbot|slurp|baiduspider|facebookexternalhit|twitterbot|linkedinbot|whatsapp|telegrambot|applebot") { set $bot_challenge 0; }
    if ($bot_challenge) {
        return 200 '<!DOCTYPE html><html><head><title>Verifying</title><script>document.cookie="dp_verified=1;path=/;max-age=86400";location.reload();</script></head><body>Verifying browser...</body></html>';
    }
{% endif %}

{% if runtime == "proxy" %}
    location / {
        proxy_pass http://127.0.0.1:{{ proxy_port }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
{% elif runtime == "php" %}
{% if php_preset == "laravel" %}
    # Laravel — public/ as document root
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "wordpress" %}
    # WordPress
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Block xmlrpc
    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block wp-config
    location = /wp-config.php {
        deny all;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "drupal" %}
    # Drupal
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/sites/.*/private/ {
        deny all;
    }

    location ~ ^/sites/.*/files/.*\.php$ {
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "joomla" %}
    # Joomla
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "symfony" %}
    # Symfony — public/ as document root
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ /\.(env|git) {
        deny all;
    }
{% elif php_preset == "codeigniter" %}
    # CodeIgniter — public/ as document root
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?/$request_uri;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "magento" %}
    # Magento — pub/ as document root
    root {{ root }}/{{ domain }}/pub;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location /static/ {
        expires 30d;
        location ~* \.(ico|jpg|jpeg|png|gif|svg|js|css|swf|eot|ttf|otf|woff|woff2)$ {
            add_header Cache-Control "public";
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            expires +1y;
            access_log off;
        }
    }

    location /media/ {
        expires 30d;
        try_files $uri $uri/ /get.php$is_args$args;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% else %}
    # Generic PHP
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% endif %}

    location ~ \.php$ {
        fastcgi_pass {{ php_socket }};
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
{% if fastcgi_cache %}
        # FastCGI cache
        set $skip_cache 0;
        if ($request_method = POST) { set $skip_cache 1; }
        if ($query_string != "") { set $skip_cache 1; }
        if ($http_cookie ~* "comment_author_|wordpress_logged_in_|wp-postpass_|PHPSESSID|laravel_session") { set $skip_cache 1; }
        if ($request_uri ~* "/wp-admin/|/wp-login.php|/cart/|/checkout/|/my-account/|/admin|/user") { set $skip_cache 1; }
        fastcgi_cache fc_{{ domain | replace(from=".", to="_") }};
        fastcgi_cache_valid 200 301 60m;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache_key "$scheme$request_method$host$request_uri";
        add_header X-FastCGI-Cache $upstream_cache_status;
{% endif %}
    }
{% else %}
    root {{ root }}/{{ domain }}/public;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
{% endif %}

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "{{ permissions_policy }}" always;
{% if csp_policy %}
    add_header Content-Security-Policy "{{ csp_policy }}" always;
{% endif %}

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

{% if custom_nginx %}
    # Custom directives
{{ custom_nginx }}
{% endif %}

    access_log /var/log/nginx/{{ domain }}.access.log;
    error_log /var/log/nginx/{{ domain }}.error.log;
}
