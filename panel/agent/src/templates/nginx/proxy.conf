{% if rate_limit > 0 %}
limit_req_zone $binary_remote_addr zone=rl_{{ domain | replace(from=".", to="_") }}:10m rate={{ rate_limit }}r/s;
{% endif %}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

{% if bot_protection == "block" %}
map $http_user_agent $bad_bot {
    default 0;
    ~*(?:ahrefsbot|semrushbot|dotbot|mj12bot|blexbot|petalbot|bytespider|gptbot|claudebot) 1;
    ~*(?:scrapy|wget|curl/|python-requests|go-http-client|java/) 1;
    "" 1;
}
{% endif %}
{% if bot_protection == "rate-limit" %}
limit_req_zone $binary_remote_addr zone=bot_{{ domain | replace(from=".", to="_") }}:10m rate=5r/s;
{% endif %}

server {
{% if bind_ip %}
    listen {{ bind_ip }}:80;
{% else %}
    listen 80;
{% endif %}
    listen [::]:80;
    server_name {{ domain }};

    client_max_body_size {{ max_upload_mb }}m;

{% if rate_limit > 0 %}
    limit_req zone=rl_{{ domain | replace(from=".", to="_") }} burst={{ rate_limit * 2 }} nodelay;
    limit_req_status 429;
{% endif %}

{% if bot_protection == "block" %}
    if ($bad_bot) { return 403; }
{% endif %}
{% if bot_protection == "rate-limit" %}
    limit_req zone=bot_{{ domain | replace(from=".", to="_") }} burst=20 nodelay;
    limit_req_status 429;
{% endif %}
{% if bot_protection == "challenge" %}
    set $bot_challenge 0;
    if ($http_cookie !~* "dp_verified=1") { set $bot_challenge 1; }
    if ($request_uri = /.well-known/bot-verify) { set $bot_challenge 0; }
    if ($http_user_agent ~* "googlebot|bingbot|yandexbot|duckduckbot|slurp|baiduspider|facebookexternalhit|twitterbot|linkedinbot|whatsapp|telegrambot|applebot") { set $bot_challenge 0; }
    if ($bot_challenge) {
        return 200 '<!DOCTYPE html><html><head><title>Verifying</title><script>document.cookie="dp_verified=1;path=/;max-age=86400";location.reload();</script></head><body>Verifying browser...</body></html>';
    }
{% endif %}

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        proxy_pass http://127.0.0.1:{{ proxy_port }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "{{ permissions_policy }}" always;
{% if csp_policy %}
    add_header Content-Security-Policy "{{ csp_policy }}" always;
{% endif %}

{% if custom_nginx %}
    # Custom directives
{{ custom_nginx }}
{% endif %}

    access_log /var/log/nginx/{{ domain }}.access.log;
    error_log /var/log/nginx/{{ domain }}.error.log;
}
